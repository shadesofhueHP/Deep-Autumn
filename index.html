<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Autumn</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#6d7280;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

@media (max-width:640px){
.logo{max-width:180px;}
.grid{gap:12px;}
.tile{border-radius:18px;}

.close-btn{
top:28px;
right:28px;
}

.controls{
top:28px;
right:76px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>Deep Autumn</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"DEEP AUTUMN NEUTRALS",
colors:[
"#F3E8DA",
"#D7BE92",
"#8A7D6A",
"#534F49",
"#403126",
"#0F1016"
]
},

{
title:"ESPRESSO + MAHOGANY",
colors:[
"#2A1408",
"#351A0A",
"#432A1D",
"#5A2D19",
"#6A4332",
"#7A4532"
]
},

{
title:"CAMEL + BRONZE",
colors:[
"#C9AC74",
"#B99052",
"#A97933",
"#9B6F14",
"#B98625",
"#7B5A2D"
]
},

{
title:"GOLD + OCHRE",
colors:[
"#D8B85C",
"#C9A827",
"#B7921B",
"#9C862F",
"#7B7C33"
]
},

{
title:"SPICE + TERRACOTTA",
colors:[
"#D07A57",
"#C95F45",
"#B94A26",
"#A94710",
"#8A3900"
]
},

{
title:"TOMATO + BRICK",
colors:[
"#C70C00",
"#B20E16",
"#A11423",
"#8D1114",
"#7C0000"
]
},

{
title:"OXBLOOD + WINE",
colors:[
"#7B0007",
"#6E1527",
"#5E1322",
"#8A243C",
"#A82944"
]
},

{
title:"AUBERGINE + PLUM",
colors:[
"#5C4655",
"#694754",
"#4E1D44",
"#66164A",
"#7F1F4E"
]
},

{
title:"OLIVE + MOSS",
colors:[
"#7B7D31",
"#697434",
"#586837",
"#4D5D32",
"#3F5127",
"#2A3B0D"
]
},

{
title:"FOREST + PINE",
colors:[
"#3F5A32",
"#31552A",
"#21461E",
"#0C3600",
"#0A4B2E",
"#2A4E3F"
]
},

{
title:"DEEP TEAL",
colors:[
"#2F7F91",
"#1E7A8C",
"#0E6D75",
"#0A5560",
"#003A46",
"#153D42"
]
},

{
title:"PETROL + INK NAVY",
colors:[
"#2D5D85",
"#1B4E77",
"#0D3555",
"#1E265A",
"#171E47",
"#00154A"
]
},

{
title:"MULBERRY + BERRY",
colors:[
"#8D003C",
"#7D1739",
"#9C1636",
"#B1003B",
"#B12942"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const lightboxColor=document.getElementById("lightboxColor");

let all=[];
let index=0;
let startX=0;

groups.forEach(group=>{

const title=document.createElement("div");
title.className="section-title";
title.textContent=group.title;
grid.appendChild(title);

group.colors.forEach(color=>{

all.push(color);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=color;

tile.onclick=()=>{
index=all.indexOf(color);
open();
};

grid.appendChild(tile);

});

});

function open(){
lightbox.classList.add("show");
render();
}

function render(){
lightboxColor.style.background=all[index];
}

function next(){
index=(index+1)%all.length;
render();
}

function prev(){
index=(index-1+all.length)%all.length;
render();
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
diff<0?next():prev();
});

</script>

</body>
</html>
